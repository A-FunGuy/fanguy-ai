spring:
  application:
    name: fanguy-ai
  ai:
    deepseek:
      api-key: ${DEEPSEEK_API_KEY}
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-v4-pro
          temperature: 0.8
    openai: # 阿里云百炼平台兼容OpenAI，所以这里使用阿里云百炼平台地址
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      api-key: ${QWEN_API_KEY}
      embedding:
        options:
          model: text-embedding-v4
          dimensions: 1024
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always
            schema: classpath:sql/schema-mysql.sql
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: "jdbc:mysql://localhost:3306/fanguy_ai?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&allowPublicKeyRetrieval=true&useSSL=false"
    username: root
    password: ${MYSQL_PASSWORD}
  servlet:
    multipart:
      max-file-size: 30MB
      max-request-size: 40MB
logging:
  level:
    org.springframework.ai: debug # AI对话的日志级别
    com.fanguy.ai: debug # 本项目的日志级别